name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test
      # config/test.exs reads these to reach the Postgres service below.
      DB_HOST: localhost
      DB_PORT: "5432"

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: homelab
          POSTGRES_PASSWORD: homelab
          POSTGRES_DB: homelab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homelab"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          # Keep in sync with the Dockerfile build stage.
          otp-version: "27.2.4"
          elixir-version: "1.17.3"

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Check for unused deps
        run: mix deps.unlock --check-unused

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo
        run: mix credo --strict

      - name: Run tests
        run: mix test
