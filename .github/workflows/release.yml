name: Release

# Build and publish the container image to GHCR whenever a GitHub Release is
# published (which also creates the version tag). `workflow_dispatch` allows a
# manual rebuild/push of the current ref.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/<repo> — already lowercase for this repo.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # From a release tag like `v1.2.3`: publishes 1.2.3, 1.2, and 1, plus
          # `latest` for non-prerelease releases. Manual runs fall back to the
          # short commit SHA.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # linux/amd64 only by default (matches the typical server host). To
          # also publish arm64, add `platforms: linux/amd64,linux/arm64` and a
          # `docker/setup-qemu-action@v3` step above — note arm64 builds are
          # emulated and considerably slower.
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Single-arch image without the extra provenance manifest entry.
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
