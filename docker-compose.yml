services:
  # TimescaleDB (PostgreSQL 17 + the timescaledb extension) backs the app DB so
  # the metric_samples time-series table can be a hypertable. The migration
  # degrades to a plain table when the extension is absent, so vanilla Postgres
  # still works (e.g. CI) — this just unlocks chunked storage locally.
  # `shared_preload_libraries` is set explicitly so `CREATE EXTENSION timescaledb`
  # succeeds even on a pgdata volume first initialized by stock Postgres.
  postgres:
    image: timescale/timescaledb:2.17.2-pg17
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    environment:
      POSTGRES_USER: homelab
      POSTGRES_PASSWORD: homelab
      POSTGRES_DB: homelab_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Dedicated Postgres for Oban, isolated from the app DB so its high-churn job
  # table can't degrade app query latency. Maps to Homelab.ObanRepo (port 5434).
  oban-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: homelab
      POSTGRES_PASSWORD: homelab
      POSTGRES_DB: homelab_oban_dev
    ports:
      - "5434:5432"
    volumes:
      - oban_pgdata:/var/lib/postgresql/data

  # Mount the Docker socket so the app can manage containers in dev
  # Usage: docker compose up postgres oban-postgres
  #        mix phx.server
  # The socket is accessed directly from the host in dev mode.

volumes:
  pgdata:
  oban_pgdata:
